<html lang="zh-TW">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:#F5F0E8;color:#3a3228;min-height:100vh}

/* ── LOGIN / WAITING（沿用初診報告同一套） ── */
#loginPage{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 20px;text-align:center}
.login-logo{font-size:12px;color:#7a6e5f;letter-spacing:3px;margin-bottom:12px}
.login-title{font-size:22px;font-weight:700;color:#4a5a2a;margin-bottom:8px}
.login-sub{font-size:14px;color:#7a6e5f;margin-bottom:32px;line-height:1.6}
.login-input{width:100%;max-width:320px;padding:14px 16px;border:1.5px solid #c8bf9a;border-radius:12px;font-size:16px;font-family:inherit;outline:none;background:white;margin-bottom:12px}
.login-input:focus{border-color:#4a5a2a}
.login-btn{width:100%;max-width:320px;padding:14px;background:#4a5a2a;color:white;border:none;border-radius:99px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
.login-btn:hover{background:#3a4a1a}
.login-error{font-size:13px;color:#8a3030;margin-top:10px;display:none}
.stage-select{display:flex;flex-direction:column;gap:8px;width:100%;max-width:320px;margin-bottom:20px}
.stage-pill{display:flex;align-items:center;gap:10px;padding:12px 16px;border:1.5px solid #c8bf9a;border-radius:12px;background:white;cursor:pointer;font-size:14px;color:#3a3228;transition:all .15s}
.stage-pill input{accent-color:#4a5a2a;width:16px;height:16px;cursor:pointer}
.stage-pill.selected{border-color:#4a5a2a;background:#f0f4e4;font-weight:600}

/* ── REPORT ── */
#reportPage{display:none}
.report-nav{background:#4a5a2a;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.report-nav-title{font-size:13px;color:#c8d8a0;letter-spacing:1px}
.print-btn{background:white;color:#4a5a2a;border:none;padding:8px 20px;border-radius:99px;font-size:13px;font-weight:600;cursor:pointer}
.back-btn{background:transparent;color:#c8d8a0;border:1px solid rgba(255,255,255,.3);padding:8px 16px;border-radius:99px;font-size:13px;cursor:pointer}

.report-section{max-width:900px;margin:0 auto;padding:48px 32px;border-bottom:2px dashed #d0c8b0}
.report-section:last-child{border-bottom:none}
.cover{background:linear-gradient(135deg,#4a5a2a 0%,#6a7a3a 100%);min-height:320px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:60px 32px}
.cover-title{font-size:32px;font-weight:700;color:white;margin-bottom:8px}
.cover-name{font-size:20px;font-weight:500;color:white;margin-top:16px}

.sec-header{margin-bottom:32px}
.sec-title{font-size:26px;font-weight:700;color:#4a5a2a;margin-bottom:4px}
.sec-divider{height:2px;background:linear-gradient(to right,#4a5a2a,transparent);margin-top:12px}

.content-card{background:white;border-radius:16px;padding:24px;margin-bottom:16px;border:1px solid #e0d8c0}
.content-card h3{font-size:16px;font-weight:700;color:#4a5a2a;margin-bottom:12px}
.two-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}

/* ── 體重對比 ── */
.weight-compare{display:flex;align-items:center;justify-content:center;gap:16px;margin:16px 0;flex-wrap:wrap}
.weight-chart-wrap{background:white;border-radius:12px;padding:20px;border:1px solid #e0d8c0;margin-top:8px}
.weight-arrow-col{display:flex;flex-direction:column;align-items:center;gap:4px}
.weight-box{text-align:center}
.weight-box .label{font-size:12px;color:#7a6e5f;margin-bottom:4px}
.weight-box .value{font-size:28px;font-weight:700;color:#4a5a2a}
.weight-arrow{font-size:24px;color:#c8a84a}
.weight-delta{display:inline-block;margin-top:8px;padding:6px 16px;border-radius:99px;font-size:14px;font-weight:600}
.weight-delta.down{background:#eef2e0;color:#4a5a2a}
.weight-delta.up{background:#fce8e8;color:#8a3030}
.weight-delta.same{background:#f0ece0;color:#7a6e5f}

/* ── 症狀進步標記 ── */
.progress-item{display:flex;align-items:center;justify-content:space-between;background:#F5F0E8;border:1px solid #e0d8c0;border-radius:12px;padding:12px 16px;margin-bottom:8px}
.progress-item .name{font-size:14px;font-weight:500;color:#3a3228}
.progress-item .scores{display:flex;align-items:center;gap:8px;font-size:13px}
.score-badge{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;font-weight:700;font-size:12px}
.score-badge.before{background:#fce8e8;color:#8a3030}
.score-badge.after{background:#eef2e0;color:#4a5a2a}

/* ── 知識題checklist ── */
.check-list{display:flex;flex-direction:column;gap:8px}
.check-item{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:#3a3228;line-height:1.5}
.check-icon{flex-shrink:0;width:18px;height:18px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;margin-top:1px}
.check-icon.pass{background:#4a5a2a;color:white}
.check-icon.fail{background:white;border:1.5px solid #d0c8b0}

/* ── 份量評估表 ── */
.food-image-wrap{border:1.5px dashed #d0c8b0;border-radius:12px;padding:16px;margin-bottom:20px;background:white}
.food-image-caption{font-size:12px;color:#a09080;margin-top:8px;line-height:1.5}
.quant-table{width:100%;border-collapse:collapse;margin-top:16px;background:white;border-radius:12px;overflow:hidden}
.quant-table th,.quant-table td{padding:10px 12px;text-align:center;font-size:13px;border-bottom:1px solid #e0d8c0}
.quant-table th{color:#7a6e5f;font-weight:600;background:#eef2e0}
.quant-table td.pass{color:#4a5a2a;font-weight:700}
.quant-table td.fail{color:#8a3030;font-weight:700}

/* ── 最後quiz答案頁 ── */
.quiz-block{background:white;border:1px solid #e0d8c0;border-radius:12px;padding:18px;margin-bottom:16px}
.quiz-q{font-size:14px;font-weight:600;color:#3a3228;margin-bottom:10px}
.quiz-opt{display:flex;align-items:center;gap:8px;font-size:13px;padding:6px 10px;border-radius:8px;margin-bottom:4px}
.opt-correct-selected{background:#eef2e0;color:#4a5a2a;font-weight:600}
.opt-correct-missed{background:#fef3e2;color:#7a5a10}
.opt-wrong-selected{background:#fce8e8;color:#8a3030}
.opt-neutral{color:#a09080}
.quiz-icon{width:16px;flex-shrink:0;text-align:center}

/* ── 營養師補充 ── */
.note-box{background:white;border:1.5px dashed #c8bf9a;border-radius:12px;padding:18px;font-size:14px;color:#5a5040;line-height:1.8;white-space:pre-wrap}

/* ── 21天排毒衛教指南 ── */
.detox-disclaimer{background:#fef3e2;border:1px solid #e8c870;border-radius:10px;padding:12px 16px;font-size:12px;color:#7a5a10;margin-bottom:20px;line-height:1.6}
.detox-list{font-size:13px;color:#5a5040;line-height:2}
.detox-table{width:100%;border-collapse:collapse;margin-top:12px;background:white}
.detox-table th,.detox-table td{border:1px solid #e0d8c0;padding:10px;font-size:12px;vertical-align:top;text-align:left}
.detox-table th{background:#eef2e0;color:#4a5a2a}

.troubleshoot-card{background:white;border:1px solid #e0d8c0;border-radius:12px;padding:14px;font-size:12px;line-height:1.6}
.troubleshoot-card h4{font-size:13px;color:#4a5a2a;margin-bottom:8px}
.troubleshoot-card .tip{color:#7a9a3a;font-weight:600;margin-top:6px}
.detox-img-slot{border:1.5px dashed #d0c8b0;border-radius:12px;padding:12px;background:white;margin-bottom:16px}
.detox-img-slot img{width:100%;border-radius:10px;display:block}
.detox-img-slot .slot-label{font-size:12px;color:#a09080;margin-top:6px;text-align:center}

@media print{
  .report-nav,.back-btn,.print-btn{display:none!important}
  .report-section{page-break-after:always;border:none;padding:32px}
  body{background:white}
}
@page{size:A4 landscape;margin:10mm}

<script>

<script>
// ══ 工具：從物件裡依序嘗試多個可能的欄位名稱，第一個有值的就回傳 ══
// 用途：因為 Airtable 欄位名稱中途改過幾次（例如 六大類食物認知→六大類食物），
// 用這個函式可以同時相容新舊名稱，不會因為改名就抓空值。
function pickField(obj, keys) {
  if (!obj) return undefined;
  for (const k of keys) {
    if (obj[k] !== undefined) return obj[k];
  }
  return undefined;
}

// ══ 工具：確保拿到的值一定是陣列 ══
// 用途：有些欄位（像排序題、複選題）從 Airtable 撈回來時，
// 有可能不是真的陣列、而是被存成單一字串（依逗號/頓號/換行分隔）。
// 這個函式統一轉成陣列，避免後面呼叫 .map()/.includes() 時因型態不對而整段中斷。
function toArray(val) {
  if (Array.isArray(val)) return val;
  if (val == null || val === '') return [];
  if (typeof val === 'string') {
    return val.split(/[,，、\n]/).map(s => s.trim()).filter(Boolean);
  }
  return [val];
}

// ══ 回診次數選擇器 ══
const STAGE_OPTIONS = [
  { key: '1st follow up', label: '第一次回診報告' },
  { key: '2nd follow up', label: '第二次回診報告' },
  { key: '3rd follow up', label: '第三次回診報告' }
];
function buildStageSelector() {
  const container = document.getElementById('stageSelect');
  STAGE_OPTIONS.forEach((s, i) => {
    const id = `stage_${i}`;
    const label = document.createElement('label');
    label.className = 'stage-pill' + (s.key === FORM_STAGE ? ' selected' : '');
    label.setAttribute('for', id);
    label.innerHTML = `<input type="radio" name="stageChoice" id="${id}" value="${s.key}" ${s.key === FORM_STAGE ? 'checked' : ''}><span>${s.label}</span>`;
    container.appendChild(label);
  });
  container.addEventListener('change', e => {
    container.querySelectorAll('.stage-pill').forEach(l => l.classList.remove('selected'));
    e.target.closest('label').classList.add('selected');
  });
}
buildStageSelector();
function getStageChoice() {
  const el = document.querySelector('input[name="stageChoice"]:checked');
  return el ? el.value : FORM_STAGE;
}

// ══ 把 symptoms 陣列攤平成 {題目: 結果} 物件 ══
function symptomsArrayToFlat(symptomsObj) {
  const flat = {};
  const arr = (symptomsObj && symptomsObj.array) || [];
  arr.forEach(row => { flat[row['題目']] = Number(row['結果']); });
  return flat;
}

// ══ 症狀分類定義（之後 FU2 會用到 digest/skin，FU3 會用到 female，先預留） ══
const DIMS = {
  diet: {
    label: '飲食與體態',
    fields: ['飲｜體重過重','飲｜體重過輕','飲｜暴食/吃過多**','飲｜渴望甜食*','飲｜渴望零食*','飲｜依賴咖啡因**','飲｜微波食品/加工品**'],
    labels: ['體重過重','體重過輕','暴食/吃過多','渴望甜食','渴望零食','依賴咖啡因','微波食品/加工品']
  },
  sleep: {
    label: '睡眠與精神',
    fields: ['睡｜精神亢奮','睡｜疲勞/睡醒還是累**','睡｜需要午睡','睡｜難入眠','睡｜半夜醒來(睡眠中斷)','睡｜打呼/睡眠呼吸中止','睡｜心情低落*','睡｜覺得被工作消耗*','睡｜不耐煩/愛生氣**'],
    labels: ['精神亢奮','疲勞/睡醒還累','需要午睡','難入眠','半夜醒來','打呼/呼吸中止','心情低落','被工作消耗','不耐煩/愛生氣']
  },
  digest: {
    label: '消化與代謝',
    fields: ['消｜脹氣**','消｜胃酸多/胃食道逆流','消｜噁心/想吐','消｜便秘**','消｜拉肚子','消｜排氣','消｜水腫**','消｜頻尿/憋尿困難'],
    labels: ['脹氣','胃酸多/逆流','噁心/想吐','便秘','拉肚子','排氣','水腫','頻尿']
  },
  skin: {
    label: '肌膚與免疫',
    fields: ['肌｜痘痘/粉刺','肌｜皮膚乾燥/紅疹','肌｜落髮','肌｜過敏','肌｜鼻塞','肌｜流鼻水','肌｜喉嚨有痰','肌｜牙齦/喉嚨發炎','肌｜嘴破/潰瘍'],
    labels: ['痘痘/粉刺','皮膚乾燥/紅疹','落髮','過敏','鼻塞','流鼻水','喉嚨有痰','牙齦/喉嚨發炎','嘴破/潰瘍']
  },
  female: {
    label: '女性健康',
    max: 21,
    fields: ['女｜經期不穩定','女｜週期間隔>30天','女｜經前症候群','女｜經期情緒低落','女｜經期不適','女｜經期服用止痛藥','女｜經期血塊大、血液顏色深'],
    labels: ['經期不穩定','週期間隔>30天','經前症候群','經期情緒低落','經期不適','服用止痛藥','血塊大/顏色深']
  }
};

// ══ 計算象限得分（0–100%），給五邊形使用 ══
// 分數愈低愈好（0 = 完全沒症狀 → 健康100%）
// max 是該象限所有題目分數加總的上限（每題最高4分）
const DIM_MAX = { diet:28, digest:32, sleep:36, skin:36, female:28 };
function calcDimPct(flatData, dim) {
  const d = DIMS[dim];
  const max = DIM_MAX[dim] || (d.fields.length * 4);
  const raw = d.fields.reduce((s, f) => s + (flatData[f] || 0), 0);
  // 健康度 = 1 - (症狀分數/滿分)，分數愈低健康度愈高
  return Math.round((1 - raw / max) * 100);
}

// ══ 五邊形雷達圖（雙層：初診淺色 + 這次深色） ══
function drawPentagonComparison(canvasId, baselineFlat, currentFlat) {
  setTimeout(() => {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    const cx = W / 2, cy = H / 2 + 10, r = Math.min(W, H) / 2 - 50;
    const dims = ['diet','digest','sleep','skin','female'];
    const labels = [['飲食','體態'],['消化','代謝'],['睡眠','精神'],['肌膚','免疫'],['女性','健康']];
    const angles = dims.map((_, i) => -Math.PI / 2 + (2 * Math.PI / 5) * i);

    ctx.clearRect(0, 0, W, H);

    // 格線
    for (let g = 1; g <= 5; g++) {
      ctx.beginPath();
      angles.forEach((a, i) => {
        const gr = r * (g / 5);
        const x = cx + gr * Math.cos(a), y = cy + gr * Math.sin(a);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      });
      ctx.closePath();
      ctx.strokeStyle = 'rgba(74,90,42,0.12)'; ctx.lineWidth = 1; ctx.stroke();
    }
    // 軸線
    angles.forEach(a => {
      ctx.beginPath(); ctx.moveTo(cx, cy);
      ctx.lineTo(cx + r * Math.cos(a), cy + r * Math.sin(a));
      ctx.strokeStyle = 'rgba(74,90,42,0.18)'; ctx.lineWidth = 1; ctx.stroke();
    });

    // 繪製多邊形的輔助函式
    function drawPolygon(flat, fillColor, strokeColor) {
      ctx.beginPath();
      dims.forEach((d, i) => {
        const pct = calcDimPct(flat, d) / 100;
        const x = cx + r * pct * Math.cos(angles[i]);
        const y = cy + r * pct * Math.sin(angles[i]);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      });
      ctx.closePath();
      ctx.fillStyle = fillColor; ctx.fill();
      ctx.strokeStyle = strokeColor; ctx.lineWidth = 2; ctx.stroke();
      // 圓點
      dims.forEach((d, i) => {
        const pct = calcDimPct(flat, d) / 100;
        const x = cx + r * pct * Math.cos(angles[i]);
        const y = cy + r * pct * Math.sin(angles[i]);
        ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI * 2);
        ctx.fillStyle = strokeColor; ctx.fill();
      });
    }

    // 初診（淺色）
    drawPolygon(baselineFlat, 'rgba(200,168,74,0.15)', 'rgba(200,168,74,0.7)');
    // 這次 FU3（深色）
    drawPolygon(currentFlat, 'rgba(74,90,42,0.2)', '#4a5a2a');

    // 標籤
    ctx.font = 'bold 13px sans-serif'; ctx.fillStyle = '#4a5a2a'; ctx.textAlign = 'center';
    const labelR = r + 28;
    labels.forEach((l, i) => {
      const x = cx + labelR * Math.cos(angles[i]);
      const y = cy + labelR * Math.sin(angles[i]);
      ctx.fillText(l[0], x, y - 6);
      ctx.fillText(l[1], x, y + 10);
    });

    // 圖例
    const legendY = H - 18;
    ctx.fillStyle = 'rgba(200,168,74,0.7)';
    ctx.fillRect(cx - 80, legendY - 8, 12, 12);
    ctx.fillStyle = '#7a6e5f'; ctx.font = '11px sans-serif'; ctx.textAlign = 'left';
    ctx.fillText('初診', cx - 64, legendY + 2);
    ctx.fillStyle = '#4a5a2a';
    ctx.fillRect(cx - 10, legendY - 8, 12, 12);
    ctx.fillStyle = '#7a6e5f';
    ctx.fillText('這次', cx + 6, legendY + 2);
  }, 150);
}

// ══ 症狀進步標記邏輯 ══
// 規則：baseline=4 且這次降到 ≤2 的優先標記；
// 不到2項時，補上「這次分數是0或1」的項目，湊到至少2項
function getProgressHighlights(baseline, currentSymptoms, dim) {
  const d = DIMS[dim];
  let highlights = [];
  d.fields.forEach((f, i) => {
    const b = baseline[f] ?? 0;
    const c = currentSymptoms[f] ?? 0;
    if (b === 4 && c <= 2) highlights.push({ label: d.labels[i], b, c });
  });
  if (highlights.length < 2) {
    d.fields.forEach((f, i) => {
      if (highlights.find(h => h.label === d.labels[i])) return;
      const c = currentSymptoms[f] ?? 0;
      if (c === 0 || c === 1) highlights.push({ label: d.labels[i], b: baseline[f] ?? 0, c });
    });
  }
  return highlights;
}

function renderSymptomSection(dims, baseline, currentSymptoms) {
  return dims.map(dim => {
    const d = DIMS[dim];
    const highlights = getProgressHighlights(baseline, currentSymptoms, dim);
    if (highlights.length === 0) {
      return `<div class="content-card"><h3>${d.label}</h3><p style="font-size:13px;color:#7a6e5f">本次無特別標記的項目</p></div>`;
    }
    return `<div class="content-card">
      <h3>${d.label}</h3>
      ${highlights.map(h => `
        <div class="progress-item">
          <span class="name">${h.label}</span>
          <span class="scores"><span class="score-badge before">${h.b}</span> → <span class="score-badge after">${h.c}</span></span>
        </div>`).join('')}
    </div>`;
  }).join('');
}

// ══ 體重折線圖 ══
function renderWeightChart(weightRecordsObj, baseline) {
  const records = (weightRecordsObj && weightRecordsObj.array) || [];

  // 如果沒有體重紀錄表資料，退回顯示初診 vs 這次的簡單對比
  if (records.length === 0) {
    const b = pickField(baseline, ['體重']);
    return `<p style="font-size:13px;color:#7a6e5f">尚無體重紀錄</p>`;
  }

  // 整理資料
  const points = records
    .filter(r => r['體重'] != null)
    .map(r => ({
      weight: Number(r['體重']),
      date: new Date(r['createdTime']),
      label: (() => {
        const d = new Date(r['createdTime']);
        return `${d.getMonth()+1}/${d.getDate()}`;
      })()
    }));

  if (points.length === 0) return '<p style="font-size:13px;color:#7a6e5f">尚無體重紀錄</p>';

  const canvasId = 'weightChart_' + Date.now();
  // 渲染後用 setTimeout 畫圖
  setTimeout(() => {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    const padL = 48, padR = 24, padT = 32, padB = 32;
    const chartW = W - padL - padR;
    const chartH = H - padT - padB;

    const weights = points.map(p => p.weight);
    const minW = Math.min(...weights) - 2;
    const maxW = Math.max(...weights) + 2;
    const rangeW = maxW - minW || 1;

    const toX = i => padL + (i / (points.length - 1 || 1)) * chartW;
    const toY = w => padT + chartH - ((w - minW) / rangeW) * chartH;

    ctx.clearRect(0, 0, W, H);

    // 格線
    ctx.strokeStyle = 'rgba(74,90,42,0.1)';
    ctx.lineWidth = 1;
    for (let i = 0; i <= 4; i++) {
      const y = padT + (chartH / 4) * i;
      ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(W - padR, y); ctx.stroke();
    }

    // 折線
    ctx.beginPath();
    ctx.strokeStyle = '#4a5a2a';
    ctx.lineWidth = 2.5;
    points.forEach((p, i) => {
      const x = toX(i), y = toY(p.weight);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.stroke();

    // 每個點：圓點 + 上方體重值 + 下方日期
    points.forEach((p, i) => {
      const x = toX(i), y = toY(p.weight);

      // 圓點
      ctx.beginPath();
      ctx.arc(x, y, 5, 0, Math.PI * 2);
      ctx.fillStyle = '#4a5a2a';
      ctx.fill();
      ctx.strokeStyle = 'white';
      ctx.lineWidth = 2;
      ctx.stroke();

      // 體重值（圓點上方）
      ctx.fillStyle = '#3a3228';
      ctx.font = 'bold 12px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(`${p.weight}`, x, y - 10);

      // 日期（X軸下方）
      ctx.fillStyle = '#a09080';
      ctx.font = '10px sans-serif';
      ctx.fillText(p.label, x, H - 8);
    });
  }, 100);

  return `<div class="weight-chart-wrap">
    <canvas id="${canvasId}" width="600" height="200" style="width:100%;height:auto"></canvas>
  </div>`;
}

function renderWeightCompare(weightRecordsObj, baseline, current) {
  return renderWeightChart(weightRecordsObj, baseline);
}

// ══ 最後quiz答案頁 ══
function renderMultiQuiz(item, current) {
  const userAns = toArray(pickField(current, item.answerKeys));
  return `<div class="quiz-block">
    <div class="quiz-q">${item.question}</div>
    ${item.options.map(opt => {
      const isCorrect = item.correct.includes(opt);
      const isSelected = userAns.includes(opt);
      let cls = 'opt-neutral', icon = '';
      if (isCorrect && isSelected) { cls = 'opt-correct-selected'; icon = '✓'; }
      else if (isCorrect && !isSelected) { cls = 'opt-correct-missed'; icon = '○'; }
      else if (!isCorrect && isSelected) { cls = 'opt-wrong-selected'; icon = '✗'; }
      return `<div class="quiz-opt ${cls}"><span class="quiz-icon">${icon}</span>${opt}</div>`;
    }).join('')}
  </div>`;
}

function renderRankQuiz(item, current) {
  const userOrder = toArray(pickField(current, item.answerKeys));
  return `<div class="quiz-block">
    <div class="quiz-q">${item.question}</div>
    <div class="two-col" style="grid-template-columns:1fr 1fr">
      <div><strong>你的排序</strong>${userOrder.map((o, i) => `<div style="margin-top:4px">${i + 1}. ${o}</div>`).join('')}</div>
      <div><strong>正確排序</strong>${item.correctOrder.map((o, i) => {
        const match = userOrder[i] === o;
        return `<div style="margin-top:4px;color:${match ? '#4a5a2a' : '#8a3030'}">${i + 1}. ${o}</div>`;
      }).join('')}</div>
    </div>
  </div>`;
}

function renderSingleQuiz(item, current) {
  const userAns = pickField(current, item.answerKeys);
  return `<div class="quiz-block">
    <div class="quiz-q">${item.question}</div>
    ${item.options.map(opt => {
      const isCorrect = opt === item.correct;
      const isSelected = opt === userAns;
      let cls = 'opt-neutral', icon = '';
      if (isCorrect && isSelected) { cls = 'opt-correct-selected'; icon = '✓'; }
      else if (isCorrect && !isSelected) { cls = 'opt-correct-missed'; icon = '○'; }
      else if (!isCorrect && isSelected) { cls = 'opt-wrong-selected'; icon = '✗'; }
      const note = item.optionNotes && item.optionNotes[opt] ? `<span style="color:#a09080;font-size:12px;margin-left:6px">（${item.optionNotes[opt]}）</span>` : '';
      return `<div class="quiz-opt ${cls}"><span class="quiz-icon">${icon}</span>${opt}${note}</div>`;
    }).join('')}
  </div>`;
}

// ══ 登入 ══
async function login() {
  const phone = document.getElementById('phoneInput').value.trim();
  const stageChoice = getStageChoice();
  if (!phone) { showError('請輸入手機號碼'); return; }
  if (!STAGE_CONFIG[stageChoice]) {
    showError('這次回診的報告頁面尚未建置完成，請聯繫營養師');
    return;
  }
  const btn = document.querySelector('.login-btn');
  btn.textContent = '查詢中…'; btn.disabled = true;
  try {
    const res = await fetch(ENDPOINT_REPORT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-make-apikey': 'princess-initial' },
      body: JSON.stringify({ phone, '填表階段': stageChoice })
    });
    const text = await res.text();
    const data = JSON.parse(text);
    if (!data || !data.current || Object.keys(data.current).length === 0) {
      showError('查無這次回診的資料，請確認手機號碼或聯繫營養師');
      btn.textContent = '查看報告 →'; btn.disabled = false;
      return;
    }
    try {
      renderReport(data, stageChoice);
    } catch (renderErr) {
      console.error('報告渲染失敗:', renderErr);
      showError('報告內容解析失敗，請聯繫工程人員（瀏覽器 Console 有詳細錯誤）');
      btn.textContent = '查看報告 →'; btn.disabled = false;
    }
  } catch (e) {
    console.log('錯誤:', e);
    showError('系統錯誤，請稍後再試');
    btn.textContent = '查看報告 →'; btn.disabled = false;
  }
}
function showError(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg; el.style.display = 'block';
}
function logout() {
  document.getElementById('reportPage').style.display = 'none';
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('phoneInput').value = '';
  document.getElementById('loginError').style.display = 'none';
}

// ══ 渲染報告 ══
function renderReport(data, stageKey) {
  const cfg = STAGE_CONFIG[stageKey];
  const baseline = data.baseline || {};
  const current = data.current || {};
  const profile = data.profile || {};
  const currentSymptoms = symptomsArrayToFlat(data.symptoms);

  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('reportPage').style.display = 'block';

  document.getElementById('coverTitle').textContent = cfg.label;
  document.getElementById('coverName').textContent = pickField(current, ['你的名字']) || pickField(baseline, ['你的名字']) || '';
  document.getElementById('overviewImg').src = cfg.overviewImage || '';

  // 體重折線圖
  document.getElementById('weightSection').innerHTML = renderWeightCompare(data.weightRecords, baseline, current);

  // 症狀進步標記
  document.getElementById('symptomSection').innerHTML = renderSymptomSection(cfg.symptomDims, baseline, currentSymptoms);

  // 睡眠時數（FU3 限定）
  const sleepCard = document.getElementById('sleepHoursCard');
  if (cfg.showSleepHours) {
    const sleepHours = pickField(current, ['平均每日睡眠時間（hr）','平均每日睡眠時間 (hr)']);
    if (sleepHours != null) {
      sleepCard.style.display = 'block';
      document.getElementById('sleepHoursSection').textContent = `${sleepHours} 小時`;
    }
  } else {
    sleepCard.style.display = 'none';
  }

  // 五邊形雷達圖（FU3 限定）
  const pentagonCard = document.getElementById('pentagonCard');
  if (cfg.showPentagon) {
    pentagonCard.style.display = 'block';
    drawPentagonComparison('pentagonCanvas', baseline, currentSymptoms);
  } else {
    pentagonCard.style.display = 'none';
  }

  // 知識 checklist（FU3 無，隱藏整個區塊）
  const knowledgeSectionEl = document.getElementById('knowledgeSectionTitle').closest('.report-section');
  if (cfg.knowledgeColumns && cfg.knowledgeColumns.length > 0) {
    knowledgeSectionEl.style.display = 'block';
    document.getElementById('knowledgeSection').innerHTML = renderKnowledgeChecklist(cfg.knowledgeColumns, current, baseline, profile);
    document.querySelector('#knowledgeSectionTitle .sec-title').textContent = cfg.knowledgeTitle || '基礎營養學知識';
  } else {
    knowledgeSectionEl.style.display = 'none';
  }

  // 份量評估＋題目解析（FU3 無，隱藏整個區塊）
  const quizSectionEl = document.getElementById('quizSection').closest('.report-section');
  if (cfg.quantityTable && cfg.quantityTable.length > 0) {
    quizSectionEl.style.display = 'block';
    document.getElementById('quantitySection').innerHTML = renderQuantityTable(cfg.quantityTable, current);
    document.getElementById('foodImg').src = cfg.foodImage || '';
    document.getElementById('foodImgCaption').textContent = cfg.foodImageCaption || '';
    document.getElementById('quizSection').innerHTML = cfg.quizReview.map(item => {
      if (item.type === 'multi') return renderMultiQuiz(item, current);
      if (item.type === 'rank') return renderRankQuiz(item, current);
      if (item.type === 'single') return renderSingleQuiz(item, current);
      return '';
    }).join('');
  } else {
    quizSectionEl.style.display = 'none';
  }

  // 排毒指南（舒心方案 FU2 限定）
  const planName = pickField(profile, ['所選方案']) || '';
  const detoxEl = document.getElementById('detoxSection');
  if (cfg.showDetoxIfPlanIncludes && planName.includes(cfg.showDetoxIfPlanIncludes)) {
    detoxEl.innerHTML = renderDetoxGuide();
  } else {
    detoxEl.innerHTML = '';
  }

  // 營養師補充（依回診次數讀對應欄位）
  const note = cfg.nutritionistNoteKey ? pickField(profile, [cfg.nutritionistNoteKey]) : null;
  const noteBox = document.getElementById('nutritionistNote');
  if (note) {
    noteBox.style.display = 'block';
    noteBox.querySelector('.note-text').textContent = note;
  } else {
    noteBox.style.display = 'none';
  }

  window.scrollTo(0, 0);
}
</script>
